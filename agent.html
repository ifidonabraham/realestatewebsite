<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agents - Real Estate Finder</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .wrap{max-width:1100px;margin:28px auto;padding:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
    .agent{background:#fff;border-radius:10px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.06);position:relative}
    .agent h4{margin:0 0 8px}
    .meta{color:#666;font-size:.95rem;margin-bottom:8px}
    .stars{color:#f6b042;font-weight:800}
    .rate-form{margin-top:10px;border-top:1px dashed #eee;padding-top:10px}
    .btn{background:#b11f1f;color:#fff;padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
    /* star UI */
    .star-row{display:flex;gap:6px;align-items:center}
    .star{font-size:20px;cursor:pointer;color:#ccc;user-select:none}
    .star.hover, .star.selected { color:#f6b042 }
    .readonly { opacity:0.6; pointer-events:none }
    .review { border-top:1px solid #fafafa;padding-top:8px;margin-top:8px }
    .response { margin-top:8px;padding:8px;border-left:3px solid #b11f1f;background:#fff9f9;border-radius:6px }
    .reply-box { margin-top:8px; display:flex; gap:8px }
    .reply-box textarea { flex:1; padding:8px; border:1px solid #ddd; border-radius:6px }
    .floating-links { position: absolute; top: 12px; right: 12px; display:flex; gap:8px }
  </style>
</head>
<body>
  <div class="floating-nav" id="mainNav">
    <!-- populated by script -->
  </div>

  <main class="wrap">
    <h2>Agents</h2>
    <p id="welcome" style="color:#555"></p>
    <div class="grid" id="agentsGrid"></div>
  </main>

  <script>
    (function(){
      const API = 'http://localhost:3000';
      const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
      if (!user) { localStorage.setItem('postLoginRedirect', '/agent.html'); window.location.href = 'login.html'; }
      document.getElementById('welcome').textContent = `Welcome, ${user.name || user.email} — ${user.type}`;

      // build nav dynamically
      const nav = document.getElementById('mainNav');
      const links = [
        { href:'index.html', text:'Home' },
        { href:'showcase.html', text:'Showcase' },
        { href:'messages.html', text:'Messages' },
        { href:'login.html', text:'Login' }
      ];
      // add quick links
      if (user.type === 'client') links.splice(2,0,{ href:'agent.html?my=1', text:'My agents' });
      if (user.type === 'agent') links.splice(2,0,{ href:'agent.html?clients=1', text:'My clients' });
      nav.innerHTML = links.map(l=>`<a href="${l.href}">${l.text}</a>`).join('');

      async function loadAgents(){
        const agents = await fetch(API + '/users?type=agent').then(r=>r.json()).catch(()=>[]);
        const ratings = await fetch(API + '/ratings').then(r=>r.json()).catch(()=>[]);
        const grid = document.getElementById('agentsGrid');
        grid.innerHTML = '';
        agents.forEach(a=>{
          const agentRatings = ratings.filter(rt => rt.agentEmail === a.email);
          const avg = agentRatings.length ? (agentRatings.reduce((s,r)=>s+r.score,0)/agentRatings.length) : 0;
          const card = document.createElement('div');
          card.className = 'agent';
          card.innerHTML = `
            <div style="display:flex;align-items:flex-start;gap:12px">
              <div style="flex:1">
                <h4>${escapeHTML(a.name || a.email)}</h4>
                <div class="meta">${escapeHTML(a.license || '')}${a.license? ' · ' : ''}${escapeHTML(a.email)}</div>
                <div>Average: <span class="stars">${avg ? avg.toFixed(1) + '★' : 'No ratings yet'}</span> <small style="color:#777">(${agentRatings.length})</small></div>
              </div>
            </div>

            <div class="rate-form" data-agent="${escapeHTML(a.email)}">
              <label style="font-weight:700">Rate this agent</label>
              <div class="star-row" aria-hidden="false">
                <span class="star" data-val="1">★</span>
                <span class="star" data-val="2">★</span>
                <span class="star" data-val="3">★</span>
                <span class="star" data-val="4">★</span>
                <span class="star" data-val="5">★</span>
                <span style="margin-left:8px;color:#666" class="selected-label"></span>
              </div>
              <textarea class="rateComment" placeholder="Optional comment" style="width:100%;margin-top:8px;padding:8px;border-radius:8px;border:1px solid #ddd"></textarea>
              <div style="display:flex;gap:8px;margin-top:8px">
                <button class="btn submitRate">Submit rating</button>
                <div style="flex:1"></div>
              </div>
            </div>

            <div class="pastRatings"></div>
          `;

          // render past ratings list with agent response and reply UI if current user is that agent
          const pastEl = card.querySelector('.pastRatings');
          pastEl.innerHTML = agentRatings.length ? agentRatings.slice().reverse().map(r => {
            const respHtml = r.response ? `<div class="response"><strong>Agent reply:</strong><div>${escapeHTML(r.response)}</div></div>` : '';
            const replyBtn = (user.type === 'agent' && user.email === a.email && !r.response) ? `<div style="margin-top:8px"><button class="btn replyBtn" data-id="${r.id}">Reply</button></div>` : '';
            return `<div class="review"><strong>${r.score}★</strong> — ${escapeHTML(r.comment||'')}<div style="font-size:.85rem;color:#777">${new Date(r.timestamp).toLocaleString()}</div>${respHtml}${replyBtn}</div>`;
          }).join('') : '<div style="color:#777;margin-top:8px">No reviews yet</div>';

          // attach star UI behavior
          const starRow = card.querySelector('.star-row');
          let selectedScore = 0;
          starRow.querySelectorAll('.star').forEach(s => {
            s.addEventListener('mouseenter', () => {
              const v = Number(s.dataset.val);
              starRow.querySelectorAll('.star').forEach(st => st.classList.toggle('hover', Number(st.dataset.val) <= v));
            });
            s.addEventListener('mouseleave', () => {
              starRow.querySelectorAll('.star').forEach(st => st.classList.remove('hover'));
            });
            s.addEventListener('click', () => {
              selectedScore = Number(s.dataset.val);
              starRow.querySelectorAll('.star').forEach(st => st.classList.toggle('selected', Number(st.dataset.val) <= selectedScore));
              card.querySelector('.selected-label').textContent = selectedScore ? `${selectedScore} / 5` : '';
            });
          });

          // prevent multiple ratings: check if current user already rated this agent
          const existingByMe = agentRatings.find(rt => rt.reviewer === (user.email || user));
          const rateForm = card.querySelector('.rate-form');
          if (existingByMe) {
            // show note, prefill and disable
            rateForm.classList.add('readonly');
            rateForm.querySelector('.selected-label').textContent = `You rated ${existingByMe.score}★`;
            rateForm.querySelector('.rateComment').value = existingByMe.comment || '';
            rateForm.querySelector('.submitRate').textContent = 'Update not allowed';
            rateForm.querySelector('.submitRate').disabled = true;
            // highlight the stars to show their rating
            rateForm.querySelectorAll('.star').forEach(st => st.classList.toggle('selected', Number(st.dataset.val) <= existingByMe.score));
          }

          // submit rating handler (clients only, one time)
          card.querySelector('.submitRate').addEventListener('click', async () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser')||'null');
            if (!currentUser) { alert('Please login to rate'); window.location.href='login.html'; return; }
            if (currentUser.type !== 'client') { alert('Only clients can rate agents.'); return; }
            if (existingByMe) { alert('You have already rated this agent.'); return; }
            if (!selectedScore) { alert('Please select a star rating first.'); return; }
            const comment = card.querySelector('.rateComment').value.trim();
            const payload = { agentEmail: a.email, reviewer: currentUser.email, score: selectedScore, comment, timestamp: new Date().toISOString() };
            try {
              const res = await fetch(API + '/ratings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
              if (!res.ok) throw new Error('Failed to save rating');
              await loadAgents();
            } catch (err) {
              console.error(err);
              alert('Failed to submit rating. Is json-server running?');
            }
          });

          // agent reply actions (delegated)
          card.addEventListener('click', async (ev) => {
            const btn = ev.target.closest('.replyBtn');
            if (!btn) return;
            const ratingId = btn.dataset.id;
            // replace button with reply UI
            const reviewEl = btn.closest('.review');
            btn.remove();
            const box = document.createElement('div');
            box.className = 'reply-box';
            box.innerHTML = `<textarea placeholder="Write a reply (agent)" rows="2"></textarea><button class="btn submitReply">Send</button>`;
            reviewEl.appendChild(box);
            box.querySelector('.submitReply').addEventListener('click', async () => {
              const txt = box.querySelector('textarea').value.trim();
              if (!txt) return alert('Enter reply text');
              try {
                const r = await fetch(API + '/ratings/' + ratingId, {
                  method: 'PATCH',
                  headers: {'Content-Type':'application/json'},
                  body: JSON.stringify({ response: txt, responseAt: new Date().toISOString(), responder: user.email })
                });
                if (!r.ok) throw new Error('Patch failed');
                await loadAgents();
              } catch (e) {
                console.error(e);
                alert('Failed to send reply');
              }
            });
          });

          grid.appendChild(card);
        });
      }

      function escapeHTML(s){ if (!s) return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

      loadAgents();
    })();
  </script>
</body>
</html>
