<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Set New Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Set New Password</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="with-bg">
    <div class="form-card">
      <h2 style="margin-top:0">Set New Password</h2>
      <form id="newPasswordForm">
        <div class="form-field">
          <label for="newPassword">New password</label>
          <input id="newPassword" type="password" placeholder="New password" required>
        </div>
        <div class="form-field">
          <button type="submit">Set Password</button>
        </div>
      </form>
      <div id="newPassMsg" class="muted" style="margin-top:8px;"></div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Real Estate Finder. All Rights Reserved.</p>
  </footer>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
