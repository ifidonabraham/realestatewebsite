<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register - Real Estate Finder</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .center{max-width:420px;margin:48px auto;padding:20px;background:#fff;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.06)}
    .field{margin-bottom:12px}
    label{display:block;font-weight:700;margin-bottom:6px}
    input,select,button,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd}
    button{background:#551414;color:#e9e9e9;border:none;font-weight:800;cursor:pointer}
  </style>
</head>
<body>
  <main>
    <div class="center">
      <h2 style="margin-top:0;color: #551414;">Create account</h2>
      <form id="registerForm" autocomplete="on">
        <div class="field">
          <label for="name">Full name</label>
          <input class="but" id="name" placeholder="Full name" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input class="but" id="email" type="email" placeholder="enter email address" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="but" id="password" type="password" placeholder="enter password" required />
        </div>
        <div class="field">
          <label for="type">Account type</label>
          <select class="but" id="type" required>
            <option class="dropdown" value="client">Client / Buyer</option>
            <option class="dropdown" value="agent">Agent</option>
          </select>
        </div>
        <div class="field" id="agentExtras" style="display:none">
          <label for="license">Agent license / Agency</label>
          <input  id="license" placeholder="Optional" />
        </div>

        <div style="display:flex;gap:8px">
          <button type="submit">Register & Continue</button>
          <a href="login.html" style="align-self:center;margin-left:auto;color:#777">Have an account?</a>
        </div>
      </form>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
