<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Showcase - Animated Properties</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Showcase layout */
    .showcase-wrap {
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:48px 20px;
      box-sizing:border-box;
    }
    .stack {
      width: 1100px;
      max-width:calc(100% - 40px);
      display:flex;
      gap:18px;
      perspective:1600px;
      align-items:flex-end;
      justify-content:center;
      flex-wrap:wrap;
    }

    .card {
      width: 320px;
      height: 220px;
      border-radius:12px;
      overflow:hidden;
      background:#fff;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
      transform-origin: center bottom;
      transform: translateY(60px) scale(.88) rotateX(12deg);
      opacity:0;
      transition: transform 320ms ease, box-shadow 220ms ease;
      position:relative;
      display:flex;
      flex-direction:column;
    }

    .media-wrap { width:100%; height:120px; display:block; background:#f3f3f3; }
    .card img, .card video {
      width:100%;
      height:120px;
      object-fit:cover;
      display:block;
    }

    .card .meta {
      padding:12px 14px;
      flex:1;
      display:flex;
      flex-direction:column;
      gap:6px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0.92));
    }
    .card .title { font-weight:700; font-size:1.05rem; color:#111; }
    .card .sub { font-size:0.92rem; color:#666; }
    .card .price { margin-top:auto; font-weight:800; color:#b11f1f; }

    /* entrance animation (staggered backwards) */
    @keyframes stackIn {
      from { transform: translateY(60px) scale(.88) rotateX(12deg); opacity:0; }
      to   { transform: translateY(0) scale(1) rotateX(0); opacity:1; }
    }

    /* when .in-play applied, cards animate using their --delay */
    .card.in-play {
      animation: stackIn 520ms cubic-bezier(.2,.9,.3,1) forwards;
      animation-delay: var(--delay);
    }

    /* hover lift */
    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 28px 60px rgba(0,0,0,0.28);
      z-index: 30;
    }

    /* edit button */
    .card .actions {
      position:absolute;
      top:10px;
      right:10px;
      display:flex;
      gap:8px;
      z-index:40;
    }
    .card .actions button {
      background: rgba(0,0,0,0.5);
      color:#fff;
      border:none;
      padding:8px 10px;
      border-radius:8px;
      cursor:pointer;
      font-weight:700;
    }

    /* modal */
    .modal-backdrop {
      position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:9999;
    }
    .modal {
      width:520px; max-width:94%; background:#fff; border-radius:12px; padding:18px; box-shadow:0 18px 50px rgba(0,0,0,0.35);
    }
    .modal h3 { margin:0 0 12px 0; }
    .modal .row { margin-bottom:10px; }
    .modal label { display:block; font-weight:700; margin-bottom:6px; }
    .modal input, .modal textarea { width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; }
    .modal .buttons { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }
    .btn { padding:10px 14px; border-radius:8px; border:none; cursor:pointer; font-weight:700; }
    .btn.primary { background:#b11f1f; color:#fff; }
    .btn.ghost { background:transparent; border:1px solid #ccc; }

    /* small screens */
    @media (max-width:980px) {
      .stack { justify-content:center; gap:12px; }
      .card { width:280px; height:210px; }
    }
  </style>
</head>
<body>
  <div class="floating-nav">
    <a href="index.html">Home</a>
    <a href="listings.html">Listings</a>
    <a href="messages.html">Messages</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  </div>

  <main class="showcase-wrap">
    <div>
      <div style="text-align:center;margin-bottom:12px;color:#fff;font-weight:900;font-size:2.2rem;text-shadow:0 10px 30px rgba(0,0,0,0.6)">Featured Properties</div>

      <!-- location dropbox / filter -->
      <div style="text-align:center;margin-bottom:12px;">
        <label for="locationSelect" style="color:#fff;margin-right:8px;">Filter by location:</label>
        <select id="locationSelect" style="padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.95);">
          <option value="">All locations</option>
        </select>
      </div>

      <div style="display:flex;gap:18px;align-items:flex-start;margin-top:8px;">
        <div style="flex:1;">
          <div class="stack" id="stack"></div>
        </div>

        <!-- Nearby map panel -->
        <div style="width:420px;min-height:360px;background:rgba(255,255,255,0.95);border-radius:8px;padding:12px;box-shadow:0 12px 30px rgba(0,0,0,0.12)">
          <h3 style="margin-top:0">Nearby Map</h3>
          <div id="nearbyMap" style="height:260px;border-radius:6px;overflow:hidden"></div>
          <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
            <button id="locMe" class="btn ghost">Use my location</button>
            <select id="nearRange" style="padding:6px;border-radius:6px">
              <option value="5">Within 5 km</option>
              <option value="10" selected>Within 10 km</option>
              <option value="25">Within 25 km</option>
              <option value="100">Within 100 km</option>
            </select>
          </div>
          <div id="nearList" style="margin-top:10px;max-height:220px;overflow:auto"></div>
        </div>
      </div>

      <div style="text-align:center;margin-top:18px;">
        <button id="seedBtn" class="btn ghost">Add Demo Properties</button>
        <button id="refreshBtn" class="btn primary">Refresh</button>
      </div>

      <div style="margin-top:10px;color:rgba(255,255,255,0.8);font-size:0.85rem;text-align:center;">
        Demo media may be local files in /images/. Agents can edit properties to update media.
      </div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <h3>Edit Property</h3>
      <div class="row">
        <label>Title</label>
        <input id="mTitle" type="text">
      </div>
      <div class="row">
        <label>Location</label>
        <input id="mLocation" type="text">
      </div>
      <div class="row">
        <label>Price</label>
        <input id="mPrice" type="number">
      </div>
      <div class="row">
        <label>Image / Video URL (or put in images/ and reference)</label>
        <input id="mImage" type="text" placeholder="images/property1.jpg or https://...">
      </div>
      <div class="row">
        <label>Description</label>
        <textarea id="mDesc" rows="4"></textarea>
      </div>
      <div class="buttons">
        <button class="btn ghost" id="cancelEdit">Cancel</button>
        <button class="btn primary" id="saveEdit">Save</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
  <script>
    // require login: redirect to login if not signed in
    const currentUser = getCurrentUser();
    if (!currentUser) {
      localStorage.setItem('postLoginRedirect', window.location.pathname);
      window.location.href = 'login.html';
    }

    const API = (window.APP_CONFIG && window.APP_CONFIG.API_BASE) ? window.APP_CONFIG.API_BASE : 'http://localhost:3000';
    const stack = document.getElementById('stack');
    const locationSelect = document.getElementById('locationSelect');
    const seedBtn = document.getElementById('seedBtn');
    const refreshBtn = document.getElementById('refreshBtn');

    // Leaflet nearby map
    const nearbyMap = L.map('nearbyMap', { center: [0,0], zoom: 2 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(nearbyMap);

    let propsAll = [];

    function isVideo(url){
      if(!url) return false;
      return /\.(mp4|webm|ogg)(\?|$)/i.test(url) || url.includes('/videos/') || url.includes('video');
    }

    async function loadShowcase(){
      try {
        propsAll = await fetch(API + '/properties?_sort=id&_order=desc&_limit=100').then(r=>r.json());
      } catch (err) {
        console.warn('fetch properties failed', err);
        propsAll = [];
      }
      renderCards(propsAll.slice(0,6));
      populateLocations(propsAll);
    }

    // render cards (keeps existing card appearance logic)
    function renderCards(items){
      stack.innerHTML = '';
      items.slice().reverse().forEach((p, revIndex) => {
        const idx = items.length - 1 - revIndex;
        const card = document.createElement('div');
        card.className = 'card';
        card.style.setProperty('--delay', `${revIndex * 0.12}s`);
        const media = p.image || ('images/property' + ((idx%6)+1) + '.jpg');
        let mediaHtml = '';
        if (isVideo(media)) {
          mediaHtml = `<div class="media-wrap"><video muted autoplay loop playsinline src="${escapeHTML(media)}"></video></div>`;
        } else {
          mediaHtml = `<div class="media-wrap"><img src="${escapeHTML(media)}" alt="${escapeHTML(p.title || 'Property')}"></div>`;
        }
        card.innerHTML = `
          <div class="actions"><button class="editBtn">Edit</button></div>
          ${mediaHtml}
          <div class="meta">
            <div class="title">${escapeHTML(p.title || 'Untitled')}</div>
            <div class="sub">${escapeHTML(p.location || '')}</div>
            <div class="price">${p.price ? '$' + Number(p.price).toLocaleString() : ''}</div>
          </div>
        `;
        card.setAttribute('data-location', (p.location||'').toLowerCase());
        card.querySelector('.editBtn')?.addEventListener('click', ()=> openEdit(p));
        stack.appendChild(card);
        requestAnimationFrame(()=> setTimeout(()=> card.classList.add('in-play'), 20));
      });

      // placeholders if fewer than 6
      if (items.length < 6) {
        const missing = 6 - items.length;
        for (let i=0;i<missing;i++){
          const card = document.createElement('div');
          card.className = 'card in-play';
          const demoIndex = (i % 6) + 1;
          card.innerHTML = `
            <div class="actions"><button class="editBtn">Edit</button></div>
            <div class="media-wrap"><img src="images/property${demoIndex}.jpg" alt="Demo"></div>
            <div class="meta">
              <div class="title">Demo Home ${demoIndex}</div>
              <div class="sub">City center</div>
              <div class="price">$${(150 + demoIndex*50).toLocaleString()}</div>
            </div>
          `;
          stack.appendChild(card);
        }
      }
    }

    function populateLocations(all){
      const locs = new Set();
      all.forEach(p => { if (p.location) locs.add(p.location); });
      const sorted = Array.from(locs).sort();
      locationSelect.innerHTML = '<option value="">All locations</option>' + sorted.map(l=>`<option value="${escapeHTML(l)}">${escapeHTML(l)}</option>`).join('');
    }

    // simple haversine distance (km)
    function haversine(lat1,lon1,lat2,lon2){
      function toRad(x){ return x*Math.PI/180; }
      const R = 6371;
      const dLat = toRad(lat2-lat1);
      const dLon = toRad(lon2-lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
      const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R*c;
    }

    document.getElementById('locMe').addEventListener('click', ()=>{
      if (!navigator.geolocation) return alert('Geolocation unsupported');
      navigator.geolocation.getCurrentPosition(pos=>{
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        nearbyMap.setView([lat,lng], 12);
        L.marker([lat,lng]).addTo(nearbyMap).bindPopup('You are here').openPopup();
        updateNearby(lat,lng);
      }, err => alert('Location denied'));
    });

    document.getElementById('nearRange').addEventListener('change', ()=>{
      const center = nearbyMap.getCenter();
      updateNearby(center.lat, center.lng);
    });

    function updateNearby(lat,lng){
      const range = Number(document.getElementById('nearRange').value || 10);
      const list = propsAll.filter(p=>p.lat && p.lng).map(p=> ({...p, _dist: haversine(lat,lng,p.lat,p.lng)}))
        .filter(p=>p._dist <= range).sort((a,b)=>a._dist-b._dist);
      document.getElementById('nearList').innerHTML = list.map(p => `<div style="padding:8px;border-bottom:1px solid #eee"><strong>${escapeHTML(p.title||'Untitled')}</strong><div style="font-size:0.9rem;color:#555">${escapeHTML(p.location||'')} — ${p._dist.toFixed(1)} km</div></div>`).join('') || '<div style="color:#666">No properties nearby</div>';

      // remove non-tile layers then add markers for list
      nearbyMap.eachLayer(layer => {
        if (layer && layer._url) return; // tile layer
        try { nearbyMap.removeLayer(layer); } catch (e) {}
      });
      list.forEach(p => L.marker([p.lat,p.lng]).addTo(nearbyMap).bindPopup(`<b>${escapeHTML(p.title)}</b><br>${escapeHTML(p.location||'')}`));
    }

    // open edit modal; only agents allowed to save (checked by currentUser.type)
    async function openEdit(prop){
      editingProp = prop;
      mTitle.value = prop.title || '';
      mLocation.value = prop.location || '';
      mPrice.value = prop.price || '';
      mImage.value = prop.image || '';
      mDesc.value = prop.description || '';
      modal.style.display = 'flex';
    }

    cancelEdit.addEventListener('click', () => {
      modal.style.display = 'none';
      editingProp = null;
    });

    saveEdit.addEventListener('click', async () => {
      const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
      if (!currentUser || currentUser.type !== 'agent') {
        alert('Only agents can update properties. Please login as an agent.');
        return;
      }
      const payload = {
        title: mTitle.value.trim(),
        location: mLocation.value.trim(),
        price: mPrice.value ? Number(mPrice.value) : null,
        image: mImage.value.trim(),
        description: mDesc.value.trim()
      };
      try {
        if (editingProp && editingProp.id) {
          await fetch(API + '/properties/' + editingProp.id, {
            method: 'PATCH',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          });
        } else {
          payload.agent = currentUser.email;
          await fetch(API + '/properties', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          });
        }
        modal.style.display = 'none';
        editingProp = null;
        await loadShowcase();
      } catch (err) {
        alert('Failed to save. Is json-server running? ' + err.message);
      }
    });

    // seed demo properties to backend (use Pexels media + placeholders)
    seedBtn.addEventListener('click', async () => {
      // Pexels direct image (works as image URL)
      const demoImage1 = 'https://images.pexels.com/photos/7578976/pexels-photo-7578976.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940';
      // Pexels video pages provided by user — try using a likely direct video path pattern (may require manual replacement if not available)
      const demoVideo2 = 'https://player.vimeo.com/external/7578012.sd.mp4?s=video'; // fallback guessed path
      const demoVideo3 = 'https://player.vimeo.com/external/7347598.sd.mp4?s=video';
      const demoImage4 = 'https://images.pexels.com/photos/8482871/pexels-photo-8482871.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940';
      // safe placeholders for remaining
      const demoPlaceholders = [
        'https://picsum.photos/seed/showcase1/800/500',
        'https://picsum.photos/seed/showcase2/800/500'
      ];

      const demo = [
        { title: 'Pexels Home 1', location: 'Downtown', price: 320000, image: demoImage1, description: 'From Pexels (image).' },
        { title: 'Pexels Video 1', location: 'Suburb', price: 210000, image: demoVideo2, description: 'Video preview (may require direct hosting).' },
        { title: 'Pexels Video 2', location: 'Uptown', price: 450000, image: demoVideo3, description: 'Video preview (may require direct hosting).' },
        { title: 'Pexels Home 2', location: 'Riverside', price: 380000, image: demoImage4, description: 'From Pexels (image).' },
        { title: 'Placeholder A', location: 'City', price: 150000, image: demoPlaceholders[0], description: 'Placeholder image.' },
        { title: 'Placeholder B', location: 'Coast', price: 220000, image: demoPlaceholders[1], description: 'Placeholder image.' }
      ];

      try {
        for (const d of demo) {
          await fetch(API + '/properties', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(d)
          });
        }
        alert('Demo properties added. Attribution: some media from Pexels (see source links).');
        loadShowcase();
      } catch (err) {
        alert('Failed to add demo properties. Make sure json-server is running.\n' + err.message);
      }
    });

    refreshBtn.addEventListener('click', loadShowcase);

    // highlight cards when location selected
    locationSelect.addEventListener('change', () => {
      const val = (locationSelect.value || '').toLowerCase();
      const cards = stack.querySelectorAll('.card');
      cards.forEach(c => {
        const matches = !val || (c.getAttribute('data-location') || '').includes(val);
        c.style.opacity = matches ? '1' : '0.28';
        c.style.transform = matches ? '' : 'scale(0.96)';
      });
      // scroll first matching into view
      const first = Array.from(cards).find(c => (c.getAttribute('data-location') || '').includes(val));
      if (first) first.scrollIntoView({behavior:'smooth', block:'center'});
    });

    // helper escape
    function escapeHTML(s){ if (!s) return ''; return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

    // initial load
    loadShowcase();
  </script>
</body>
</html>
