<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Real Estate Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="hero">
  <!-- header kept in HTML but hidden by CSS -->
  <header>
    <h1>Real Estate Finder</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </nav>
  </header>

  <main class="with-bg">
    <div class="hero-title">Real Estate Finder</div>

    <div class="floating-nav" style="right:18px;left:auto;">
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="showcase.html">Showcase</a>
    </div>

    <div class="form-card">
      <h2 style="margin-top:0;">Login</h2>
      <form id="loginForm" autocomplete="on">
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="email@example.com" required>
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Password" required>
        </div>

        <div class="form-field">
          <button type="submit">Login</button>
        </div>

        <p class="muted">Don’t have an account? <a href="register.html">Register</a></p>
        <p style="text-align:center;"><a href="reset.html">Forgot password?</a></p>
      </form>
    </div>
  </main>

  <!-- footer intentionally omitted (hidden globally by CSS) -->

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
