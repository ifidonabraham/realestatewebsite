<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agent Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .center{max-width:420px;margin:48px auto;padding:20px;background:#fff;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.06)}
    .field{margin-bottom:12px}
    label{display:block;font-weight:700;margin-bottom:6px}
    input,select,button,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd}
    button{background:#551414;color:#e9e9e9;border:none;font-weight:800;cursor:pointer}
  </style>
</head>
<body>
  <header>
    <h1>Agent Dashboard</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="listings.html">Listings</a>
      <a href="messages.html">Messages</a>
      <a href="login.html" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <main>
    <div class="floating-nav">
  <a href="index.html">Home</a>
  <a href="listings.html">Listings</a>
  <a href="messages.html">Messages</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
</div>
    <div style="max-width:1000px;margin:18px auto;padding:16px;">
      <h2>Upload Property</h2>
      <form id="propertyUploadForm" enctype="multipart/form-data">
        <div class="form-field"><label>Title</label><input id="propertyTitle" type="text" placeholder="enter title" required></div>
        <div class="form-field"><label>Location</label><input id="propertyLocation" type="text" placeholder="enter location" required></div>
        <div class="form-field"><label>Price</label>
          <select id="propertyPrice" name="" required>
            <option value="5">150 to 250k</option>
            <option value="4">250 to 400k</option>
            <option value="3">600 to 1000000k</option>
            <option value="2">2m to 5m</option>
            <option value="1">10m to 50m</option>
          </select>
        </div>
        <div class="form-field"><label>Description</label><textarea id="propertyDescription" rows="-2" cols="30" required></textarea></div>
        <div class="form-field"><label>Image</label><input id="propertyImage" type="file" accept="image/*" required></div>
        <div class="form-field"><label>video</label><input id="propertyVideo" type="file" accept="video/*" ></div>
        <div class="form-field"><button type="submit">Upload Property</button></div>
      </form>

      <h2 style="margin-top:22px;">Your Properties</h2>
      <div id="agentProperties"></div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Real Estate Finder. All Rights Reserved.</p>
  </footer>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
