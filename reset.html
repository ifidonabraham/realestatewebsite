<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Reset Password</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="with-bg">
    <div class="floating-nav">
  <a href="index.html">Home</a>
  <a href="listings.html">Listings</a>
  <a href="messages.html">Messages</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
</div>
    <div class="form-card">
      <h2 style="margin-top:0">Reset Password</h2>
      <form id="resetForm">
        <div class="form-field">
          <label for="resetEmail">Email</label>
          <input id="resetEmail" type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-field">
          <button type="submit">Send Verification Code</button>
        </div>
      </form>

      <form id="verifyForm" style="display:none;margin-top:10px;">
        <div class="form-field">
          <label for="verificationCode">Verification Code</label>
          <input id="verificationCode" type="text" placeholder="Enter code" required>
        </div>
        <div class="form-field">
          <button id="verifyBtn" type="submit">Verify</button>
        </div>
      </form>

      <div id="resetMsg" class="muted" style="margin-top:8px;"></div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Real Estate Finder. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
