<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Client - Real Estate Finder</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .wrap{max-width:900px;margin:36px auto;padding:16px}
    .card{background:#fff;padding:18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
    .btn{background:#b11f1f;color:#fff;padding:10px 12px;border-radius:8px;border:none;cursor:pointer}
    .floating-nav a{margin-right:10px}
  </style>
</head>
<body>
  <div class="floating-nav" id="mainNav">
    <!-- populated dynamically -->
  </div>

  <main class="wrap">
    <div class="card">
      <h2 id="welcome">Welcome</h2>
      <p>Use the buttons below to explore agents or view featured properties.</p>
      <div style="display:flex;gap:8px">
        <a class="btn" href="agent.html">Find Agents</a>
        <a class="btn" href="showcase.html">View Showcase</a>
      </div>
    </div>
  </main>

  <script>
    (function(){
      const user = JSON.parse(localStorage.getItem('currentUser')||'null');
      if (!user) { localStorage.setItem('postLoginRedirect','/client.html'); window.location.href='login.html'; }
      document.getElementById('welcome').textContent = `Hello, ${user.name || user.email}`;

      // dynamic nav with My agents / My clients quick links
      const nav = document.getElementById('mainNav');
      const links = [
        { href:'index.html', text:'Home' },
        { href:'showcase.html', text:'Showcase' },
        { href:'messages.html', text:'Messages' },
        { href:'login.html', text:'Login' }
      ];
      if (user.type === 'client') links.splice(2,0,{ href:'agent.html?my=1', text:'My agents' });
      if (user.type === 'agent') links.splice(2,0,{ href:'client.html?myclients=1', text:'My clients' });
      nav.innerHTML = links.map(l=>`<a href="${l.href}">${l.text}</a>`).join('');
    })();
  </script>
</body>
</html>
